<div class="bg-surface-50 dark:bg-surface-950 flex min-h-screen items-center justify-center px-4" *transloco="let t">
    <div class="w-full max-w-md">
        <div class="surface-card rounded-2xl p-8 shadow-lg">
            <div class="mb-8 text-center">
                <h1 class="text-surface-900 dark:text-surface-0 mb-2 text-3xl font-bold">{{ t('register.title') }}</h1>
                <p class="text-surface-500">{{ t('register.subtitle') }}</p>
            </div>

            @if (errorMessage()) {
            <p-message [text]="errorMessage()!" severity="error" styleClass="w-full mb-4" />
            }

            <form class="flex flex-col gap-4" (ngSubmit)="onSubmit()">
                <div class="flex flex-col gap-1">
                    <label class="text-surface-700 dark:text-surface-200 font-medium" for="username"
                        >{{ t('register.username') }} <span class="text-red-500">*</span></label
                    >
                    <input
                        class="w-full"
                        id="username"
                        [(ngModel)]="username"
                        autocomplete="username"
                        name="username"
                        pInputText
                        [placeholder]="t('register.usernamePlaceholder')"
                        required
                        type="text"
                    />
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-surface-700 dark:text-surface-200 font-medium" for="displayName"
                        >{{ t('register.displayName') }}</label
                    >
                    <input
                        class="w-full"
                        id="displayName"
                        [(ngModel)]="displayName"
                        autocomplete="name"
                        name="displayName"
                        pInputText
                        [placeholder]="t('register.displayNamePlaceholder')"
                        type="text"
                    />
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-surface-700 dark:text-surface-200 font-medium" for="email"
                        >{{ t('register.email') }} <span class="text-red-500">*</span></label
                    >
                    <input
                        class="w-full"
                        id="email"
                        [(ngModel)]="email"
                        autocomplete="email"
                        name="email"
                        pInputText
                        [placeholder]="t('register.emailPlaceholder')"
                        required
                        type="email"
                    />
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-surface-700 dark:text-surface-200 font-medium" for="password"
                        >{{ t('register.password') }} <span class="text-red-500">*</span></label
                    >
                    <p-password
                        [(ngModel)]="password"
                        [toggleMask]="true"
                        autocomplete="new-password"
                        inputId="password"
                        inputStyleClass="w-full"
                        name="password"
                        [placeholder]="t('register.passwordPlaceholder')"
                        required
                        styleClass="w-full"
                    />
                </div>

                <p-button
                    [disabled]="!username || !email || !password"
                    [loading]="loading()"
                    [label]="t('register.submit')"
                    styleClass="w-full mt-2"
                    type="submit"
                />
            </form>

            <div class="text-surface-500 mt-6 text-center">
                {{ t('register.hasAccount') }}
                <a class="text-primary ml-1 font-medium hover:underline" routerLink="/login">{{ t('register.loginLink') }}</a>
            </div>
        </div>
    </div>
</div>
