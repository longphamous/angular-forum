<div class="mx-auto flex max-w-2xl flex-col gap-6 p-6" *transloco="let t">
    <p-toast />
    <p-confirmDialog />

    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-surface-900 dark:text-surface-0 m-0 text-2xl font-bold">{{ t('clans.settings') }}</h1>
            @if (facade.currentClan(); as clan) {
            <p class="text-surface-500 mt-1">{{ clan.name }}</p>
            }
        </div>
        @if (facade.currentClan(); as clan) {
        <p-button [label]="t('common.back')" [routerLink]="['/clans', clan.id]" icon="pi pi-arrow-left" severity="secondary" text />
        }
    </div>

    <div class="surface-card flex flex-col gap-4 rounded-xl p-6 shadow">
        <div class="flex flex-col gap-1">
            <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldName') }}</label>
            <input [ngModel]="name()" (ngModelChange)="name.set($event)" pInputText type="text" />
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1">
                <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldTag') }}</label>
                <input [ngModel]="tag()" (ngModelChange)="tag.set($event)" pInputText type="text" maxlength="6" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldTagColor') }}</label>
                <div class="flex items-center gap-2">
                    <input [ngModel]="tagColor()" (ngModelChange)="tagColor.set($event)" pInputText type="color" class="h-10 w-16 cursor-pointer" />
                    @if (tag()) {
                    <span class="rounded px-2 py-1 text-sm font-bold text-white" [style.background-color]="tagColor()">{{ tag() }}</span>
                    }
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldDescription') }}</label>
            <textarea [ngModel]="description()" (ngModelChange)="description.set($event)" pTextarea [rows]="5" class="w-full"></textarea>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldJoinType') }}</label>
            <p-select
                [ngModel]="joinType()"
                [options]="joinTypeOptions()"
                (ngModelChange)="joinType.set($event)"
                optionLabel="label"
                optionValue="value"
            />
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldApplicationTemplate') }}</label>
            <textarea [ngModel]="applicationTemplate()" (ngModelChange)="applicationTemplate.set($event)" pTextarea [rows]="3" class="w-full"></textarea>
        </div>

        <div class="flex flex-col gap-3">
            <div class="flex items-center gap-2">
                <p-checkbox [ngModel]="showActivity()" (ngModelChange)="showActivity.set($event)" [binary]="true" inputId="showActivity" />
                <label for="showActivity" class="text-surface-700 dark:text-surface-200">{{ t('clans.showActivity') }}</label>
            </div>
            <div class="flex items-center gap-2">
                <p-checkbox [ngModel]="showMembers()" (ngModelChange)="showMembers.set($event)" [binary]="true" inputId="showMembers" />
                <label for="showMembers" class="text-surface-700 dark:text-surface-200">{{ t('clans.showMembers') }}</label>
            </div>
            <div class="flex items-center gap-2">
                <p-checkbox [ngModel]="showComments()" (ngModelChange)="showComments.set($event)" [binary]="true" inputId="showComments" />
                <label for="showComments" class="text-surface-700 dark:text-surface-200">{{ t('clans.showComments') }}</label>
            </div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
            <p-button
                [disabled]="!name()"
                [label]="t('common.button.save')"
                [loading]="saving()"
                (onClick)="save()"
                icon="pi pi-check"
            />
        </div>
    </div>

    <!-- Danger Zone -->
    <div class="rounded-xl border-2 border-red-300 p-6 dark:border-red-800">
        <h3 class="m-0 mb-2 text-lg font-bold text-red-600">{{ t('clans.dangerZone') }}</h3>
        <p class="text-surface-500 mb-4 text-sm">{{ t('clans.disbandConfirm') }}</p>
        <p-button [label]="t('clans.disbandClan')" (onClick)="disbandClan()" icon="pi pi-trash" severity="danger" />
    </div>
</div>
