<div class="mx-auto flex max-w-2xl flex-col gap-6 p-6" *transloco="let t">
    <p-toast />

    <div>
        <h1 class="text-surface-900 dark:text-surface-0 m-0 text-2xl font-bold">{{ t('clans.createClan') }}</h1>
        <p class="text-surface-500 mt-1">{{ t('clans.subtitle') }}</p>
    </div>

    <div class="surface-card flex flex-col gap-4 rounded-xl p-6 shadow">
        <div class="flex flex-col gap-1">
            <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldName') }} *</label>
            <input [ngModel]="name()" (ngModelChange)="name.set($event)" pInputText type="text" />
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1">
                <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldTag') }}</label>
                <input [ngModel]="tag()" (ngModelChange)="tag.set($event)" pInputText type="text" maxlength="6" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldTagColor') }}</label>
                <div class="flex items-center gap-2">
                    <input [ngModel]="tagColor()" (ngModelChange)="tagColor.set($event)" pInputText type="color" class="h-10 w-16 cursor-pointer" />
                    @if (tag()) {
                    <span class="rounded px-2 py-1 text-sm font-bold text-white" [style.background-color]="tagColor()">{{ tag() }}</span>
                    }
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldDescription') }} *</label>
            <textarea [ngModel]="description()" (ngModelChange)="description.set($event)" pTextarea [rows]="5" class="w-full"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1">
                <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldCategory') }}</label>
                <p-select
                    [ngModel]="categoryId()"
                    [options]="facade.categories()"
                    (ngModelChange)="categoryId.set($event)"
                    optionLabel="name"
                    optionValue="id"
                    [showClear]="true"
                    [placeholder]="t('clans.selectCategory')"
                />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-surface-700 dark:text-surface-200 font-medium">{{ t('clans.fieldJoinType') }}</label>
                <p-select
                    [ngModel]="joinType()"
                    [options]="joinTypeOptions()"
                    (ngModelChange)="joinType.set($event)"
                    optionLabel="label"
                    optionValue="value"
                />
            </div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
            <p-button [label]="t('common.button.cancel')" routerLink="/clans" severity="secondary" text />
            <p-button
                [disabled]="!name() || !description()"
                [label]="t('clans.createClan')"
                [loading]="saving()"
                (onClick)="submit()"
                icon="pi pi-check"
            />
        </div>
    </div>
</div>
