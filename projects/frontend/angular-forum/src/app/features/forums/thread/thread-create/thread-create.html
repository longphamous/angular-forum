<p-fluid>
    <div class="card">
        <div class="mb-6 flex items-center gap-3">
            <p-button (onClick)="cancel()" [text]="true" icon="pi pi-arrow-left" />
            <h1 class="text-xl font-semibold">Neuen Thread erstellen</h1>
        </div>

        @if (error) {
        <p-message [text]="error" severity="error" styleClass="mb-4 w-full" />
        }

        <div class="flex">
            <div class="card flex w-full flex-col gap-6">
                <div class="text-lg font-semibold">Thread-Informationen</div>
                <p-divider />
                <div class="flex w-full flex-wrap gap-2">
                    <label class="w-full font-medium" for="thread-title">Titel</label>
                    <input
                        class="w-full"
                        id="thread-title"
                        [(ngModel)]="title"
                        [disabled]="submitting"
                        pInputText
                        placeholder="Thread-Titel eingeben..."
                        type="text"
                    />
                </div>
                <div class="flex w-full flex-col gap-2">
                    <label class="font-medium" for="thread-tags">
                        Tags <span class="text-surface-400 font-normal text-sm">(optional – Enter oder Komma zum Hinzufügen)</span>
                    </label>
                    <div class="border-surface-300 dark:border-surface-600 focus-within:border-primary flex flex-wrap items-center gap-2 rounded-md border bg-white px-3 py-2 dark:bg-surface-900">
                        @for (tag of tags; track tag) {
                        <p-chip
                            [label]="tag"
                            [removable]="true"
                            (onRemove)="removeTag(tag)"
                        />
                        }
                        <input
                            class="min-w-24 flex-1 border-none bg-transparent text-sm outline-none"
                            id="thread-tags"
                            [(ngModel)]="tagInput"
                            [disabled]="submitting"
                            (keydown)="addTag($event)"
                            placeholder="Tag eingeben…"
                            type="text"
                        />
                    </div>
                    <span class="text-surface-400 text-xs">{{ tags.length }} Tag(s) hinzugefügt</span>
                </div>
            </div>
        </div>

        <div class="mt-8 flex">
            <div class="card flex w-full flex-col gap-6">
                <div class="text-lg font-semibold">Inhalt</div>
                <p-divider />
                <div class="flex w-full flex-wrap">
                    <p-editor
                        class="w-full"
                        [(ngModel)]="content"
                        [readonly]="submitting"
                        [style]="{ height: '320px' }"
                    />
                </div>
                <div class="flex justify-end gap-2">
                    <p-button
                        (onClick)="cancel()"
                        [disabled]="submitting"
                        [outlined]="true"
                        label="Abbrechen"
                        severity="secondary"
                    />
                    <p-button (onClick)="submit()" [loading]="submitting" icon="pi pi-check" label="Thread erstellen" />
                </div>
            </div>
        </div>
    </div>
</p-fluid>
